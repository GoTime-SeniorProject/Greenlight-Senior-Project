overwrite: true
schema: "./src/graphql/schema/schema.ts"
documents: "src/graphql/schema/types/**/*.ts"

generates:
  ./src/graphql/generated.ts:
    plugins:
      - add:
          content: |-
            /* -------------------------------------------------------------------------- */
            /* THIS FILE IS AUTO-GENERATED. DO NOT EDIT BY HAND.                            */
            /* To update, run: `npx graphql-codegen --config codegen.yml`                   */
            /* The header below disables TypeScript and ESLint checks for this generated file. */
            /* -------------------------------------------------------------------------- */
            /* eslint-disable */
            // @ts-nocheck
      - typescript
      - typescript-operations
      - typescript-react-apollo
    config:
      withHooks: true
      withHOC: false
      withComponent: false
      enumsAsTypes: true
      apolloReactHooksImportFrom: '@apollo/client/react'
      apolloReactCommonImportFrom: '@apollo/client'

  ../ui-student/src/generated.tsx:
    plugins:
      - add:
          content: |-
            /* -------------------------------------------------------------------------- */
            /* THIS FILE IS AUTO-GENERATED. DO NOT EDIT BY HAND.                            */
            /* To update, run: `npx graphql-codegen --config codegen.yml`                   */
            /* The header below disables TypeScript and ESLint checks for this generated file. */
            /* -------------------------------------------------------------------------- */
            /* eslint-disable */
            // @ts-nocheck
      - typescript
      - typescript-operations
      - typescript-react-apollo
    config:
      withHooks: true
      withHOC: false
      withComponent: false
      enumsAsTypes: true
      apolloReactHooksImportFrom: '@apollo/client/react'
      apolloReactCommonImportFrom: '@apollo/client'